background {
    monitor = eDP-1
    path = /home/cosnate/backups/wallpapers/98.jpg
    blur_passes = 0
    contrast = 0
    brightness = 0
    vibrancy = 0
    vibrancy_darkness = 0
}

label {
    monitor = eDP-1

    text = cmd[update:1000] echo "$(date '+%H:%M')"
    color = rgba(255, 255, 255, 0.5)
    font_size = 20
    font_family = JetBrains Mono

    position = -100, -100
    halign = right
    valign = top
}

