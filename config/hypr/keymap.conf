#---------------------- 
# SWITCHING WORKSPACES |
#---------------------- 
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

#---------------------------------
# MOVING WINDOW ACROSS WORKSPACES |
#---------------------------------
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

bind = SUPER, s, togglespecialworkspace
bind = SUPER SHIFT, n, movetoworkspace, e+1
bind = SUPER SHIFT, s, movetoworkspace, special
bind = SUPER SHIFT, c, exec, hyprctl dispatch centerwindow

#-------------------
# WINDOW MANAGEMENT |
#-------------------
bind = SUPER, h, movefocus, l
bind = SUPER, l, movefocus, r
bind = SUPER, k, movefocus, u
bind = SUPER, j, movefocus, d

bind = SUPER SHIFT, h, movewindow, l
bind = SUPER SHIFT, l, movewindow, r
bind = SUPER SHIFT, k, movewindow, u
bind = SUPER SHIFT, j, movewindow, d

bind = SUPER, Q, killactive
bind = ALT, escape, exit
bind = SUPER, t, togglesplit

bind = SUPER, f, fullscreen 
bind = SUPER Shift, f, fullscreenstate, -1 2 

bind = SUPER, p, togglefloating,

bind = ALT, Tab, cyclenext,
bind = ALT, Tab, bringactivetotop,

bind = SUPER, O, exec, hyprctl setprop active opaque toggle
bind = SUPER CTRL, Return, exec, [workspace special;noanim] $terminal --class "floating" --title "controlCenter"

#-- RESIZING WINDOWS --
bind = SUPER CTRL, h, resizeactive, -20 0
bind = SUPER CTRL, l, resizeactive, 20 0
bind = SUPER CTRL, k, resizeactive, 0 -20
bind = SUPER CTRL, j, resizeactive, 0 20

bind = SUPER SHIFT CTRL, l, resizeactive,150 0
bind = SUPER SHIFT CTRL, h, resizeactive,-150 0
bind = SUPER, g, exec, $scripts/togglegaps.sh
bind = SUPER SHIFT, g, exec, $scripts/noBorder.sh

#-----------------------------------
# EXECUTIONS - {PROGRAMS , SCRIPTS} |
#-----------------------------------
bind = SUPER, Tab, exec, zen &
bind = SUPER Shift, Tab, exec, zen --private-window &
bind = SUPER ALT, L, exec, hyprlock
bind = SUPER, n, exec, $scripts/blue.sh 
bind = ALT, F4, exec, $scripts/Wlogout.sh

bind = SUPER, SPACE, exec, $menu 
bind = SUPER, Return, exec, $terminal
bind = SUPER, E, exec, $fileManager 
bind = SUPER, R, exec, $scripts/books.sh
bind = SUPER, M, exec, kitty --title "sysmon" -e $sysMonitor

#-- clipse: clipboard manager
bind = SUPER, V, exec, [workspace;float;size 900 600;center] $terminal -e bash -c 'clipse -listen && clipse $PPID'

#-- grim/slurp: screenshot and ocr
bind = , Print, exec, $scripts/fullss.sh            # full screen
bind = SUPER SHIFT, Print, exec, $scripts/rectss.sh # rectangle selection
bind = SUPER SHIFT, o, exec, $scripts/ocr.sh

#-- hyprpicker: color picker
bind = SUPER, c, exec, notify-send $(hyprpicker -af hex)

#-- volume controls
bindl = , xf86audioraisevolume, exec, $scripts/Volume.sh --inc # volume up
bindl = , xf86audiolowervolume, exec, $scripts/Volume.sh --dec # volume down
bindl = , xf86audiomute, exec, $scripts/Volume.sh --toggle     # toggele mute

#-- brightness controls [fn key]
bind = , xf86MonBrightnessUp, exec, $scripts/Brightness.sh --inc   # increase by 5
bind = , xf86MonBrightnessDown, exec, $scripts/Brightness.sh --dec # decrease by 5
bind = SUPER, down, exec, $scripts/Brightness.sh --one             # set to 1

#-- home-row controls [ sound and brightness ]
bind = SUPER, u, exec, $scripts/Brightness.sh --inc
bind = SUPER, d, exec, $scripts/Brightness.sh --dec
bind = SUPER SHIFT, u, exec, $scripts/Volume.sh --inc
bind = SUPER SHIFT, d, exec, $scripts/Volume.sh --dec
bind = SUPER SHIFT, m, exec, $scripts/Volume.sh --toggle

# -- monitor controls
bind = SUPER SHIFT, SPACE, exec, $scripts/scale.sh
bind = SUPER, down, exec, $scripts/Brightness_Monitor.sh --one #-- same as main monitor
bind = SUPER SHIFT, up, exec, $scripts/Brightness_Monitor.sh --inc
bind = SUPER SHIFT, down, exec, $scripts/Brightness_Monitor.sh --dec

#-- UI modifiers
bind = SUPER, W, exec, $scripts/wallpaper.sh
bind = SUPER, B, exec, $scripts/togglebar.sh
bind = SUPER SHIFT, return, exec, $scripts/cursor.sh

#--------------------------------
# Move/resize windows with mouse |
#--------------------------------
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow
